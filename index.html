<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project Bassam Alshujaa Bassam-Radwan</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="searchContainer" id="searchContainer">
      <!-- this feature is for level 400  -->
      <!-- <label for="showType"></label>
      <select name="showType" id="showType" class="episodeSelector">
        <option value="all">All shows</option>
      </select> -->

      <label for="episodeSelector"></label>
      <select
        name="episodeSelector"
        class="episodeSelector"
        id="episodeSelector"
      >
        <option value="default">All Episodes</option>
      </select>

      <input id="searchBar" type="search" placeholder="Search..." />
      <label for="searchBar"></label>
      <p title="  Search For Episodes 🔎">
        Displaying <span id="manyEpisodes"></span> Episodes
      </p>
      <div class="loader" id="loader">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="root"></div>

    <!-- error element  -->
    <div id="error404">
      <div class="stars"></div>

      <div class="containererror">
        <div class="number">404</div>
        <div class="message">Oops! You're lost in space.</div>
        <a href="/" class="button">Go Back Home</a>
      </div>
    </div>
    <script src="script.js"></script>
    <footer>
      <p>
        Data originally from
        <a href="https://www.tvmaze.com" target="_blank">TVMaze.com</a>
      </p>
    </footer>
  </body>
</html>
